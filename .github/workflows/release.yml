# PyPI + GitHub Release after CI succeeds on a version tag.
#
# PyPI Trusted Publishing (OIDC): register THIS workflow file on PyPI (Warehouse matches these exactly):
#   PyPI → ai-lib-python → Publishing → Add Trusted Publisher → GitHub
#   - Owner (name): ailib-official
#   - Repository: ai-lib-python  (hyphen; not ai_lib_python)
#   - Workflow filename: release.yml  (the file name under .github/workflows/, not the workflow `name:`)
#   - Owner id (numeric): 268981910  (must match GitHub repo owner id; verify with:
#       gh api repos/ailib-official/ai-lib-python --jq .owner.id )
#   - Environment on PyPI: leave empty unless you add `environment: ...` to job
#     `pypi-and-github-release` and use the same name in PyPI.
#
# Troubleshooting `invalid-publisher` with a valid token: almost always a mismatch on repository
# name, workflow filename, or owner id; or PyPI has an environment set while the claim is MISSING.
# OIDC debug claims for this flow include:
#   workflow_ref: .../.github/workflows/release.yml@refs/heads/main
#   (expected for workflow_run; PyPI verifies job_workflow_ref against ref/sha claims.)
#
# Flow: push tag v* → workflow "CI" runs (build uploads dist artifact) → this workflow runs on
# workflow_run(completed) → we confirm HEAD is exactly a semver tag → download dist → PyPI + GH Release.

name: Publish (PyPI)

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    outputs:
      ok: ${{ steps.check.outputs.ok }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
      run_id: ${{ github.event.workflow_run.id }}
    steps:
      - name: Check out at CI head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - id: check
        name: Exact semver tag only
        run: |
          tag=$(git describe --tags --exact-match 2>/dev/null || true)
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Detected release tag: $tag"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Not an exact semver tag on this commit (got: '${tag:-none}'). Skipping publish."
          fi

  pypi-and-github-release:
    name: Publish to PyPI and create GitHub Release
    needs: verify-tag
    if: needs.verify-tag.outputs.ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository at release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-tag.outputs.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download CI build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
          run-id: ${{ needs.verify-tag.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
