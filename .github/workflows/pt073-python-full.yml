# PT-073 (Wave-5): Python **full** compliance matrix (PT-073a).
# Runs entire tests/compliance/ including policy-heavy cases (e.g. 06-resilience).

name: PT-073 Python (full)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  full:
    name: Full compliance + EP boundary
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ai-lib-python

    steps:
      - name: Checkout ai-lib-python
        uses: actions/checkout@v4
        with:
          path: ai-lib-python

      - name: Checkout ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          ref: main
          path: ai-protocol

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: E/P boundary — Python
        run: |
          python "${{ github.workspace }}/ai-protocol/tests/compliance/ep-boundary/check_ep_boundary.py" \
            --python-root "${{ github.workspace }}/ai-lib-python"

      - name: ExecutionMetadata samples — schema validation
        run: |
          python "${{ github.workspace }}/ai-protocol/tests/compliance/ep-boundary/validate_execution_metadata_samples.py" \
            --protocol-root "${{ github.workspace }}/ai-protocol"

      - name: Contact layer — import smoke
        run: |
          python -c "import ai_lib_python.routing, ai_lib_python.resilience"

      - name: Compliance tests (full matrix)
        env:
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: python -m pytest tests/compliance/ -q --tb=short

      - name: Architecture — import boundary
        env:
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: python -m pytest tests/architecture/test_execution_layer_import_boundary.py -q --tb=short

      - name: ExecutionMetadata — runtime schema test
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
        run: python -m pytest tests/types/test_execution_metadata_schema.py -q --tb=short
